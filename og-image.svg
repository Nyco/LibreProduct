<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1117"/>
      <stop offset="100%" style="stop-color:#1a1d2e"/>
    </linearGradient>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4a0"/>
      <stop offset="50%" style="stop-color:#3b9eff"/>
      <stop offset="100%" style="stop-color:#9b5de5"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle glow blobs -->
  <ellipse cx="200" cy="150" rx="320" ry="200" fill="#00d4a0" opacity="0.05" filter="url(#glow)"/>
  <ellipse cx="1050" cy="480" rx="280" ry="180" fill="#9b5de5" opacity="0.06" filter="url(#glow)"/>

  <!-- Top accent line -->
  <rect x="80" y="80" width="160" height="3" rx="2" fill="url(#grad1)"/>

  <!-- Logo mark -->
  <rect x="80" y="112" width="52" height="52" rx="10" fill="url(#grad1)" opacity="0.15"/>
  <text x="106" y="146" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="url(#grad1)" text-anchor="middle">LP</text>

  <!-- Brand name -->
  <text x="148" y="146" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#ffffff">Libre</text>
  <text x="220" y="146" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="400" font-style="italic" fill="#9b5de5">Product</text>

  <!-- Main headline -->
  <text x="80" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="62" font-weight="700" fill="#ffffff" letter-spacing="-1">Monétisation OSS</text>
  <text x="80" y="355" font-family="system-ui, -apple-system, sans-serif" font-size="62" font-weight="700" letter-spacing="-1">
    <tspan fill="url(#grad1)">France</tspan>
    <tspan fill="#ffffff"> &amp; </tspan>
    <tspan fill="url(#grad1)">Europe</tspan>
  </text>

  <!-- Subtitle -->
  <text x="80" y="418" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="400" fill="#8892a4">Audit · Modèles · Exécution — pour fondateurs open source</text>

  <!-- Bottom pills -->
  <rect x="80" y="490" width="110" height="36" rx="18" fill="#ffffff" opacity="0.06"/>
  <text x="135" y="513" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">Open-core</text>

  <rect x="204" y="490" width="120" height="36" rx="18" fill="#ffffff" opacity="0.06"/>
  <text x="264" y="513" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">Cloud managé</text>

  <rect x="338" y="490" width="80" height="36" rx="18" fill="#ffffff" opacity="0.06"/>
  <text x="378" y="513" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">SaaS</text>

  <rect x="432" y="490" width="130" height="36" rx="18" fill="#ffffff" opacity="0.06"/>
  <text x="497" y="513" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">Licence enterprise</text>

  <!-- Right side: URL -->
  <text x="1120" y="555" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500" fill="#8892a4" text-anchor="end">libreproduct.com</text>
</svg>
